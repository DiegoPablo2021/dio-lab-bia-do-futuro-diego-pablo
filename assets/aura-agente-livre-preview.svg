<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" fill="#091424"/>
  <rect width="268" height="900" fill="#2A2B34"/>

  <text x="20" y="98" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">Contexto da conversa</text>
  <text x="20" y="140" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Modo de experiência</text>
  <circle cx="150" cy="135" r="8" stroke="#8893A7" stroke-width="1.5"/>
  <text x="147" y="140" fill="#8893A7" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700">?</text>
  <circle cx="27" cy="169" r="8" stroke="#6F788C" stroke-width="1.4"/>
  <circle cx="27" cy="195" r="8" fill="#FF4D57"/>
  <text x="44" y="174" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="16">Demonstração guiada</text>
  <text x="44" y="200" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Agente livre</text>

  <text x="20" y="235" fill="#B7BECF" font-family="Segoe UI, Arial, sans-serif" font-size="14">Personalize o perfil para usar a Aura</text>
  <text x="20" y="262" fill="#B7BECF" font-family="Segoe UI, Arial, sans-serif" font-size="14">como agente educacional em um</text>
  <text x="20" y="289" fill="#B7BECF" font-family="Segoe UI, Arial, sans-serif" font-size="14">atendimento mais livre.</text>

  <text x="20" y="332" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Nome da pessoa</text>
  <rect x="20" y="338" width="229" height="40" rx="8" fill="#0F1320"/>
  <text x="20" y="415" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Idade</text>
  <rect x="20" y="421" width="229" height="40" rx="8" fill="#0F1320"/>
  <text x="34" y="447" fill="#909AAF" font-family="Segoe UI, Arial, sans-serif" font-size="16">Ex.: 32</text>
  <text x="20" y="498" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Profissão</text>
  <rect x="20" y="504" width="229" height="40" rx="8" fill="#0F1320"/>
  <text x="20" y="581" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Renda mensal</text>
  <rect x="20" y="587" width="229" height="40" rx="8" fill="#0F1320"/>
  <text x="30" y="613" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="16">5000,00</text>
  <text x="195" y="613" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="22">−</text>
  <text x="225" y="613" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="22">+</text>
  <text x="20" y="660" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Perfil investidor</text>
  <rect x="20" y="666" width="229" height="40" rx="8" fill="#0F1320"/>
  <text x="34" y="692" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="16">moderado</text>
  <path d="M226 682L233 689L240 682" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="20" y="742" fill="#AEB7CA" font-family="Segoe UI, Arial, sans-serif" font-size="13">Respostas equilibradas, com</text>
  <text x="20" y="769" fill="#AEB7CA" font-family="Segoe UI, Arial, sans-serif" font-size="13">comparação entre segurança e</text>
  <text x="20" y="796" fill="#AEB7CA" font-family="Segoe UI, Arial, sans-serif" font-size="13">diversificação.</text>
  <text x="20" y="838" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Objetivo principal</text>
  <rect x="20" y="844" width="229" height="40" rx="8" fill="#0F1320"/>

  <rect x="337" y="114" width="1223" height="235" rx="26" fill="#0D1B31" stroke="#1F3657"/>
  <text x="359" y="150" fill="#F0B35A" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="2">DIAGNÓSTICO FINANCEIRO COM IA, DADOS E GUARDRAILS</text>
  <text x="359" y="224" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="46" font-weight="700">Aura, Mentora de Saúde Financeira</text>
  <text x="359" y="278" fill="#E4ECF8" font-family="Segoe UI, Arial, sans-serif" font-size="18">Uma mentora digital que explica, organiza e contextualiza. Sem promessas vazias, sem recomendação direta de investimento</text>
  <text x="359" y="306" fill="#E4ECF8" font-family="Segoe UI, Arial, sans-serif" font-size="18">e com foco em clareza para iniciantes.</text>

  <text x="337" y="420" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="15">Entradas</text>
  <text x="337" y="460" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">R$ 5.000,00</text>
  <text x="657" y="420" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="15">Saídas</text>
  <text x="657" y="460" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">R$ 2.488,90</text>
  <text x="974" y="420" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="15">Saldo do período</text>
  <text x="974" y="460" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">R$ 2.511,10</text>
  <text x="1300" y="420" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="15">Reserva concluída</text>
  <text x="1300" y="460" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">33.3%</text>

  <text x="337" y="482" fill="#8F98AB" font-family="Segoe UI, Arial, sans-serif" font-size="15">Os indicadores financeiros agora simulam o contexto informado ao lado, preservando a estrutura da base demonstrativa da DIO.</text>

  <text x="337" y="530" fill="#FF4D57" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Chat educativo</text>
  <text x="423" y="530" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="16">Diagnóstico</text>
  <text x="498" y="530" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="16">Plano de 7 dias</text>
  <line x1="337" y1="551" x2="1560" y2="551" stroke="#2F4057" stroke-width="2"/>

  <text x="337" y="594" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Converse com a Aura</text>
  <text x="337" y="636" fill="#909AAF" font-family="Segoe UI, Arial, sans-serif" font-size="15">Perguntas sugeridas: Onde estou gastando mais? | O que é Selic? | Me explique Tesouro Selic.</text>
  <rect x="337" y="665" width="123" height="38" rx="10" fill="#121827" stroke="#51617A"/>
  <text x="354" y="690" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Nova conversa</text>

  <rect x="351" y="727" width="36" height="36" rx="10" fill="#F59B23"/>
  <rect x="361" y="739" width="16" height="12" rx="2" stroke="#0B0B0B" stroke-width="2"/>
  <path d="M365 739V735C365 732.8 366.8 731 369 731C371.2 731 373 732.8 373 735V739" stroke="#0B0B0B" stroke-width="2" stroke-linecap="round"/>
  <circle cx="369" cy="745" r="1.6" fill="#0B0B0B"/>
  <text x="404" y="742" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">Sou a Aura. Posso analisar seus gastos, explicar conceitos financeiros e montar um plano educativo com base no seu contexto.</text>
  <text x="404" y="771" fill="#909AAF" font-family="Segoe UI, Arial, sans-serif" font-size="15">Modo: intro</text>

  <rect x="337" y="811" width="1223" height="55" rx="12" fill="#2B2A33"/>
  <text x="359" y="846" fill="#A7B0C3" font-family="Segoe UI, Arial, sans-serif" font-size="18">Digite sua dúvida sobre saúde financeira</text>
  <rect x="1515" y="823" width="32" height="32" rx="10" fill="#4B4D63"/>
  <path d="M1531 845V833" stroke="#C7D0E0" stroke-width="2" stroke-linecap="round"/>
  <path d="M1526 838L1531 833L1536 838" stroke="#C7D0E0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
